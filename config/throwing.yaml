behaviors:
  Throwing:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 700000
    time_horizon: 64
    summary_freq: 10000

environment_parameters:
  target_distance:
    curriculum:
      - name: Lesson0_Close
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.4
        value: 4.0
      - name: Lesson1_Medium
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5
        value: 5.5
      - name: Lesson2_Far
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.4
        value: 7.0
      - name: Lesson3_Final
        value: 8.0
  target_size:
    curriculum:
      - name: Lesson0
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
