      - name: Lesson1
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5
        value: 0.7
      - name: Lesson2
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.4
        value: 0.5
      - name: Lesson3
        value: 0.5
  target_speed:
    curriculum:
      - name: Lesson0
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.5
        value: 0.0
      - name: Lesson1
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.4
        value: 0.0
      - name: Lesson2
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.4
        value: 1.5
      - name: Lesson3
