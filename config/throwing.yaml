behaviors:
  Throwing:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 5.0e-4
      beta: 1.5e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1500000
    time_horizon: 64
    summary_freq: 10000

# v3 curriculum: kleinere distance-stappen (4 -> 4.5 -> 5 -> 5.5 -> 6 -> 7 -> 8)
# en lagere thresholds dan v2. v2 bleef hangen op lesson 0 (~+0.25 reward)
# omdat de drempel 0.3 te hoog was en de sprong 4m -> 5.5m te groot. Alle
# curricula gebruiken dezelfde reward-measure en dezelfde 7 lessons met
# identieke thresholds, zodat ze in lockstep progresseren.
environment_parameters:
  target_distance:
    curriculum:
      - name: Lesson0_4m
        completion_criteria:
          measure: reward
          behavior: Throwing
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.2
        value: 4.0
      - name: Lesson1_4_5m
        completion_criteria:
